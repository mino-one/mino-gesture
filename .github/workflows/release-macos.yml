name: release-macos

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      # 减少 Cargo 进度条输出，略微降低 I/O（对总耗时影响很小，日志更干净）
      CARGO_TERM_PROGRESS_WHEN: never

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Rust / rust-cache 放在 Node 之前：与预热 job 步骤顺序一致，避免无关 env 参与缓存 key；先恢复大缓存再装前端
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          # 与 rust-cache-warm-macos.yml 共用稳定 key：tag 发布可从 main 上预热的缓存恢复
          shared-key: mino-gesture-macos-universal
          add-job-id-key: false
          cache-bin: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          uploadUpdaterJson: false
          args: --target universal-apple-darwin
